  #         key: cypress

  #     - name: 📦️ Install Cypress
  #       if: steps.cache-cypress.outputs.cache-hit != 'true'
  #       run: npx cypress install

  #     - uses: nrwl/nx-set-shas@v4

  #     - name: 📸 e2e
  #       if: github.event_name == 'push'
  #       run: npx nx run-many --target=e2e --parallel=1

  #     - name: 📸 e2e
  #       if: github.event_name == 'pull_request'
  #       run: npx nx affected --target=2e2 --parallel=1

  build:
    name: 📦️ Build
    needs: preinstall
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      actions: 'read'

    steps:
      - name: 🔍️ Checkout
        uses: actions/checkout@v4

      - name: 👷 Prepare CI
        uses: ./.github/actions/prepare
        with:
          cache_node_modules_key: node-modules-${{ hashFiles('package-lock.json') }}

      - uses: nrwl/nx-set-shas@v4

      - name: 📦️ Build
        if: github.event_name == 'push'
        run: npx nx run-many --target=build

      - name: 📦️ Build
        if: github.event_name == 'pull_request'
        run: npx nx affected --target=build

  release:
    name: 🔖 Release
    needs: [
        'preinstall',
        'lint',
        'test',
        # 'e2e',
        'build',
      ]
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 🔍️ Checkout
        uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: 👷 Prepare CI
        uses: ./.github/actions/prepare
        with:
          cache_node_modules_key: node-modules-${{ hashFiles('package-lock.json') }}
          git_bot_token: ${{ steps.app-token.outputs.token }}

      - name: Release
        uses: ./.github/actions/release
        with:
          github_token: ${{ steps.app-token.outputs.token }}
